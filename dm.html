  <!-- 導入と使い方セクション -->
  <section class="page-title-section">
    <h2 class="page-title">DM爆撃Botガイド</h2>

  <!-- 概要説明セクション -->
  <main class="tool-container">
    <div class="command-card">
      <div class="command-card-header">
        <h3><i class="fas fa-bolt"></i> DM爆撃Botの機能概要</h3>
      </div>
      <p>サーバー内に配置された50体のBotでターゲットに対してDMを大量送信します。<br>
        高負荷の攻撃を短時間で仕掛ける用途を想定しています。</p>
      <ul>
        <li>REST APIの並列処理を採用しているため非常に高速です</li>
      </ul>
    </div>

    <div class="command-card">
      <div class="command-card-header">
        <h3><i class="fas fa-list"></i> コマンド一覧</h3>
      </div>
      <dl>
        <dt>/dm_user [ターゲットのユーザーID]</dt>
        <dd>指定したユーザーにDM爆撃が開始されます</dd>
      </dl>
      <p>送信可能回数（上限値）：500</p>
      <p>利用制限）Freezeのブーストを行っているユーザーのみ使用可能</p>
    </div>

    <div class="page-action">
      <a href="https://discord.gg/cyvqWKSKn5" target="_blank" class="action-btn">
