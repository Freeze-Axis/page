<!DOCTYPE html>
<html lang="ja">
<head>
  <!----------------------------------------------------------------->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#a9ceec" />

  <title>Freeze公式サイト - NukeBot使い方</title>
  <meta name="description" content="Discordで活動する多目的グループ“Freeze”の公式サイトです。" />
  <link rel="icon" href="https://i.ibb.co/LyFxxY5/freeze.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Freeze" />
  <meta property="og:title" content="NukeBot使い方" />
  <meta property="og:description" content="詳細情報はサイトをチェック" />
  <meta property="og:url" content="" />
  <meta property="og:image" content="" />
  <!----------------------------------------------------------------->

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <div class="container">
      <a href="index.html" class="logo">Freeze</a>
      <button id="nav-toggle" class="nav-toggle" aria-label="メニュー開閉">☰</button>
      <nav id="nav">
        <!-- JS で nav.html の #header-menu が挿入されます -->
      </nav>
    </div>
  </header>

  <!-- NukeBot タイムラインセクション -->
  <main class="nukebot-container">
    <h2 class="section-title">NukeBot 使い方ガイド</h2>
    <div class="timeline">
      <div class="timeline-item" data-step="1">
        <div class="timeline-content">
          <h3>導入方法</h3>
          <p>下のボタンをクリックで導入できます</p>
          <a href="https://discord.com/oauth2/authorize?client_id=1371794313448652830" target="_blank">Botを追加</a>
        </div>
      </div>
      <div class="timeline-item" data-step="2">
        <div class="timeline-content">
          <h3>/通常攻撃（外部アプリコマンド）</h3>
          <p>3つの攻撃タイプを選択すると、ボタンが送信されます。<br>
            ボタンを押すことでメッセージが5件送信されます。<br>
            連打する事で連続送信が可能です。</p>
        </div>
      </div>
      <div class="timeline-item" data-step="3">
        <div class="timeline-content">
          <h3>!nuke</h3>
          <p>サーバー名の変更、チャンネル全削除＆チャンネル大量作成、<br>
            @everyoneに全権限付与など、一括破壊を自動実行。</p>
        </div>
      </div>
      <div class="timeline-item" data-step="4">
        <div class="timeline-content">
          <h3>!allban [Guild ID]</h3>
          <p>現在のサーバー、またはサーバーIDの指定で、<br>
            そのサーバーから全メンバーをBANします。</p>
        </div>
      </div>
    </div>
  </main>

  <!-- フッター -->
  <footer>
    <nav id="footer-nav">
      <!-- JS で nav.html の #footer-menu が挿入されます -->
    </nav>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
