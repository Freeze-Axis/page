  <!-- NukeBot タイムラインセクション -->
  <main class="nukebot-container">
    <h2 class="section-title">NukeBot 使い方ガイド</h2>
    <div class="timeline">
      
      <div class="timeline-item" data-step="1">
        <div class="timeline-content">
          <h3>導入方法</h3>
          <p>下のボタンをクリックして Discord に Bot を追加してください。</p>
          <a href="https://discord.com/oauth2/authorize?client_id=1371794313448652830" target="_blank">Botを追加</a>
        </div>
      </div>
      
      <div class="timeline-item" data-step="2">
        <div class="timeline-content">
          <h3>/通常攻撃 コマンド</h3>
          <p>指定した攻撃タイプのメッセージを 5 連続で送信します。高速連打で強力な連続送信が可能です。</p>
        </div>
      </div>
      
      <div class="timeline-item" data-step="3">
        <div class="timeline-content">
          <h3>!nuke コマンド</h3>
          <p>サーバー名の変更、チャンネル全削除＆再生成、@everyone 権限付与など、一括破壊を自動実行。</p>
        </div>
      </div>
      
      <div class="timeline-item" data-step="4">
        <div class="timeline-content">
          <h3>!allban コマンド</h3>
          <p>現在のサーバー、または指定したギルド ID の全メンバーを並列 BAN します。</p>
        </div>
      </div>

    </div>
  </main>
