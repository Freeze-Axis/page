<!DOCTYPE html>
<html lang="ja">
<head>
  <!----------------------------------------------------------------->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#a9ceec" />

  <!-- 動的に更新するタイトル -->
  <title id="page-title">Freeze公式サイト - NukeBot使い方ガイド</title>
  <meta name="description" content="Discordで活動する多目的グループ“Freeze”の公式サイトです。" />
  <link rel="icon" href="https://i.ibb.co/39dXLvV3/Freeze-logo.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Freeze" />
  <meta property="og:title" content="荒らしBot使い方ガイド" id="og-title" />
  <meta property="og:description" content="詳細情報はサイトをチェック" id="og-desc" />
  <meta property="og:url" content="" id="og-url" />
  <meta property="og:image" content="https://i.ibb.co/39dXLvV3/Freeze-logo.png" id="og-image" />
  <!----------------------------------------------------------------->

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- ページ固有スタイル -->
  <style>
    .toggle-btns { display:flex; justify-content:center; gap:var(--spacing-md); margin-bottom:var(--spacing-lg); }
    .toggle-btn { padding:var(--spacing-sm) var(--spacing-lg); border:none; border-radius:var(--radius); background:var(--clr-card); color:var(--clr-text); cursor:pointer; transition:background var(--transition); }
    .toggle-btn.active { background:var(--clr-primary); color:var(--clr-bg); }
    .command-section { display:none; }
    .command-section.active { display:block; }
  </style>

  <!-- ハッシュごとの meta 情報 -->
  <script>
    const metaConfig = {
      appcmd: { title: '外部アプリ版 荒らしBot使い方', description: '詳細はサイトをチェック' },
      guildcmd: { title: 'NukeBot使い方', description: '詳細はサイトをチェック' }
    };

    function updateUI(hash) {
      const current = metaConfig[hash] ? hash : 'appcmd';
      // タグ切替
      document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.target === current));
      document.querySelectorAll('.command-section').forEach(sec => sec.classList.toggle('active', sec.id === current));
      updateMeta(current);
    }

    function updateMeta(hash) {
      const cfg = metaConfig[hash] || metaConfig.appcmd;
      const fullUrl = `${location.origin}${location.pathname}#${hash}`;
      const titleText = `Freeze公式サイト - ${cfg.title}`;
      // document title
      document.title = titleText;
      document.getElementById('page-title').textContent = titleText;
      // OGP
      document.getElementById('og-title').setAttribute('content', cfg.title);
      document.getElementById('og-desc').setAttribute('content', cfg.description);
      document.getElementById('og-url').setAttribute('content', fullUrl);
      document.getElementById('og-image').setAttribute('content', 'https://i.ibb.co/39dXLvV3/Freeze-logo.png');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const initialHash = location.hash.replace('#','');
      updateUI(initialHash);
      // ハッシュ変更対応
      window.addEventListener('hashchange', () => updateUI(location.hash.replace('#','')));

      // ボタン切替処理
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tgt = btn.dataset.target;
          history.replaceState(null, '', `#${tgt}`);
          updateUI(tgt);
        });
      });
    });
  </script>
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo">Freeze</a>
      <button id="nav-toggle" class="nav-toggle" aria-label="メニュー開閉">☰</button>
      <nav id="nav"><!-- nav.html #header-menu --></nav>
    </div>
  </header>

  <main class="nukebot-container" style="padding:var(--spacing-lg); max-width:800px; margin:auto;">
    <h2 class="section-title">NukeBot 使い方ガイド</h2>
    <div class="toggle-btns">
      <button class="toggle-btn" data-target="appcmd">外部アプリコマンド</button>
      <button class="toggle-btn" data-target="guildcmd">サーバー内コマンド</button>
    </div>

    <section id="appcmd" class="command-section">
      <div class="timeline">
        <div class="timeline-item">
          <div class="timeline-content">
            <h3>/通常攻撃<br>（外部アプリコマンド）</h3>
            <p>3つの攻撃タイプを選択。ボタン連打で最大5件連続送信可能。</p>
          </div>
        </div>
      </div>
    </section>

    <section id="guildcmd" class="command-section">
      <div class="timeline">
        <div class="timeline-item">
          <div class="timeline-content">
            <h3>!nuke</h3>
            <p>サーバー名変更／全チャンネル削除＆大量作成／@everyoneに権限付与。</p>
          </div>
        </div>
        <div class="timeline-item">
          <div class="timeline-content">
            <h3>!allban [Guild ID]</h3>
            <p>指定サーバーで全メンバーBAN実行。</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <nav id="footer-nav"><!-- nav.html #footer-menu --></nav>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
