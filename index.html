<!DOCTYPE html>
<html lang="ja">
<head>

  <meta property="og:title" content="Freeze公式サイト" />
  <meta property="og:description" content="ホームページ" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 外部CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <!-- デスクトップ版 (769px以上) -->
  <link rel="stylesheet" href="css/desktop/index.css" media="screen and (min-width: 769px)">
  <!-- モバイル版 (768px以下) -->
  <link rel="stylesheet" href="css/mobile/index.css" media="screen and (max-width: 768px)">
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <div class="container">
      <a href="index.html" class="logo">
        <span class="primary">Freeze</span>
      </a>
      <button id="nav-toggle" class="nav-toggle" aria-label="メニュー開閉">

        <!-- JS で nav.html の #header-menu が挿入されます -->

  <section class="hero-section">

      <div class="hero-text">
        <h1>
          <span class="primary">Freeze☭Axis</span></span>

        <div class="hero-buttons">
          <a href="https://discord.gg/reRxqAXSSG" class="hero-btn primary">
            Discordに参加
          </a>
          <a href="#services" class="hero-btn secondary">

          </a>
        </div>
      </div>
      <div class="hero-image">
        <div class="discord-circle">
          <i class="fab fa-discord"></i>
        </div>
      </div>
    </div>
  </section>

  <!-- フッター -->
  <footer>
    <nav id="footer-nav">
      <!-- JS で nav.html の #footer-menu が挿入されます -->
    </nav>
  </footer>

  <script src="js/app.js"></script>
