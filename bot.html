<!DOCTYPE html>
<html lang="ja">
<head>
  <!----------------------------------------------------------------->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#a9ceec" />

  <title>Freeze公式サイト - 荒らしBot使い方</title>
  <meta name="description" content="Freeze公式サイトの荒らしBot導入ガイド。外部アプリ版とNuke版から選択できます。" />

  <link rel="icon" href="https://i.ibb.co/MknjZBVr/Freeze-logo.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Freeze" />
  <meta property="og:title" content="荒らしBot使い方" />
  <meta property="og:description" content="Freeze公式サイトの荒らしBot導入ガイド。外部アプリ版とNuke版を1ページで確認できます。" />
  <meta property="og:url" content="" />
  <meta property="og:image" content="" />
  <!----------------------------------------------------------------->

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 外部CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <!-- デスクトップ版 (769px以上) -->
  <link rel="stylesheet" href="css/desktop/bot.css" media="screen and (min-width: 769px)">
  <!-- モバイル版 (768px以下) -->
  <link rel="stylesheet" href="css/mobile/bot.css" media="screen and (max-width: 768px)">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo">
        Freeze
      </a>
      <button id="nav-toggle" class="nav-toggle" aria-label="メニュー開閉">
        <i class="fas fa-bars"></i>
      </button>
      <nav id="nav"><!-- nav.html #header-menu --></nav>
    </div>
  </header>

  <!-- 導入と使い方セクション -->
  <section class="page-title-section">
    <h2 class="page-title">荒らしBot導入ガイド</h2>
  </section>

  <main class="tool-container">
    <!-- モード選択リスト（ツール/拡張タイプ） -->
    <div class="mode-selection" id="mode-list">
      <div class="mode-card external-card">
        <a href="bot-external.html" class="mode-link">
          <div class="mode-icon">
            <i class="fas fa-mobile-alt"></i>
          </div>
          <div class="mode-content">
            <h3 class="mode-title">外部アプリ版</h3>
            <p class="mode-description">Discordクライアントから直接操作できる外部アプリ型Bot。TOKEN設定で全チャンネル攻撃が可能。</p>
            <div class="mode-features">
              <span class="feature-tag">簡単操作</span>
              <span class="feature-tag">高速攻撃</span>
              <span class="feature-tag">安全ログアウト</span>
            </div>
          </div>
          <div class="mode-arrow">
            <i class="fas fa-chevron-right"></i>
          </div>
        </a>
      </div>

      <div class="mode-card nuke-card">
        <a href="bot-nuke.html" class="mode-link">
          <div class="mode-icon">
            <i class="fas fa-skull-crossbones"></i>
          </div>
          <div class="mode-content">
            <h3 class="mode-title">Nuke版</h3>
            <p class="mode-description">サーバー完全破壊特化型Bot。一括BANやチャンネル削除など、強力な破壊コマンドを搭載。</p>
            <div class="mode-features">
              <span class="feature-tag">完全破壊</span>
              <span class="feature-tag">一括処理</span>
              <span class="feature-tag">復旧不可</span>
            </div>
          </div>
          <div class="mode-arrow">
            <i class="fas fa-chevron-right"></i>
          </div>
        </a>
      </div>
    </div>
  </main>

  <!-- フッター -->
  <footer>
    <div class="container">
      <nav id="footer-nav">
        <!-- JS で nav.html の #footer-menu が挿入されます -->
      </nav>
    </div>
  </footer>

  <!-- 外部JS -->
  <script src="js/app.js"></script>
  <script src="js/bot.js"></script>
</body>
</html>
