<!DOCTYPE html>
<html lang="ja">
<head>
  <!----------------------------------------------------------------->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#a9ceec" />

  <title>Freeze公式サイト - 荒らしBot使い方</title>
  <meta name="description" content="" />

  <link rel="icon" href="https://i.ibb.co/39dXLvV3/Freeze-logo.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Freeze" />
  <meta property="og:title" content="荒らしBot使い方" />
  <meta property="og:description" content="導入と説明はサイトから" />
  <meta property="og:url" content="" />
  <meta property="og:image" content="" />
  <!----------------------------------------------------------------->

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 外部CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/bot.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo">
        <img src="https://i.ibb.co/39dXLvV3/Freeze-logo.png" alt="Freeze Logo" class="logo-img">
        Freeze
      </a>
      <button id="nav-toggle" class="nav-toggle" aria-label="メニュー開閉">
        <i class="fas fa-bars"></i>
      </button>
      <nav id="nav"><!-- nav.html #header-menu --></nav>
    </div>
  </header>

  <!-- 導入と使い方セクション -->
  <section class="page-title-section">
    <h2 class="page-title">荒らしBot導入ガイド</h2>
  </section>

  <main class="tool-container">
    <!-- Bot導入ボタン -->
    <div class="page-action">
      <a href="https://discord.com/oauth2/authorize?client_id=1475627706698825810"
         target="_blank"
         class="action-btn">
        <i class="fab fa-discord"></i> Bot導入
      </a>
    </div>

    <!-- モバイル用タブ切り替え -->
    <div class="command-tabs">
      <button class="tab active" data-target="external-commands">外部アプリ</button>
      <button class="tab" data-target="server-commands">サーバー</button>
    </div>
    <!-- コマンド比較セクション -->
    <div class="commands-comparison">
        <!-- 左側: 外部アプリコマンド -->
        <section class="command-section external-commands active">
          <div class="section-header">
            <h3><i class="fas fa-external-link-alt"></i> 外部アプリコマンド</h3>
            <p>マイアプリに追加で機能するコマンド</p>
          </div>
          
          <div class="timeline">
            <div class="timeline-item" data-step="1">
              <div class="timeline-content">
                <h3>/通常攻撃</h3>
                <p>実行したチャンネルにスパムを開始</p>
              </div>
            </div>
            <div class="timeline-item" data-step="4">
              <div class="timeline-content">
                <h3>/操作</h3>
                <p>対象のサーバーの全チャンネルにスパムを開始<br>
                  ※TOKENログイン必須</p>
              </div>
            </div>
            <div class="timeline-item" data-step="2">
              <div class="timeline-content">
                <h3>/TOKEN設定（登録,ログイン）</h3>
                <p>TOKENログインを行うことで機能が拡張されます。</p>
              </div>
            </div>
            <div class="timeline-item" data-step="3">
              <div class="timeline-content">
                <h3>/ログアウト</h3>
                <p>ログイン中のTOKENからログアウト</p>
              </div>
            </div>
          </div>
        </section>

        <!-- 右側: サーバーコマンド -->
        <section class="command-section server-commands">
          <div class="section-header">
            <h3><i class="fas fa-server"></i> サーバー内コマンド</h3>
            <p>Bot導入時に機能するコマンド</p>
          </div>
          
          <div class="timeline">
            <div class="timeline-item" data-step="1">
              <div class="timeline-content">
                <h3>!nuke</h3>
                <p>サーバー破壊コマンド</p>
              </div>
            </div>
            
            <div class="timeline-item" data-step="2">
              <div class="timeline-content">
                <h3>!allban [サーバーID]</h3>
                <p>全員BAN</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- フッター -->
  <footer>
    <div class="container">
      <nav id="footer-nav">
        <!-- JS で nav.html の #footer-menu が挿入されます -->
      </nav>
    </div>
  </footer>

  <!-- 外部JS -->
  <script src="js/app.js"></script>
  <script src="js/bot.js"></script>
</body>
</html>
